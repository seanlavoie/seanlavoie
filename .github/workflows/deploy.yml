name: Deploy

on:
  push:
    branches: [main]

# Only one deploy at a time; cancel older in-flight runs on the same branch.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# Required permissions for GitHub Pages deployment via Actions
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portfolio
        run: pnpm --filter portfolio build

      - name: Build blog
        run: pnpm --filter blog build

      - name: Assemble site artifact
        run: |
          mkdir -p dist
          cp -r apps/portfolio/dist/. dist/
          mkdir -p dist/blog
          cp -r apps/blog/dist/. dist/blog/
          echo "seanlavoie.com" > dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment

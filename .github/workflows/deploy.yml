name: Deploy

on:
  push:
    branches: [main]

# Only one deploy at a time; cancel older in-flight runs on the same branch.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-portfolio:
    name: Deploy portfolio → seanhoots.com
    runs-on: ubuntu-latest
    environment:
      name: production-portfolio
      url: https://seanhoots.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portfolio
        run: pnpm --filter portfolio build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_PORTFOLIO }}
          vercel-args: '--prod'
          working-directory: apps/portfolio

  deploy-blog:
    name: Deploy blog → blog.seanhoots.com
    runs-on: ubuntu-latest
    environment:
      name: production-blog
      url: https://blog.seanhoots.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build blog
        run: pnpm --filter blog build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_BLOG }}
          vercel-args: '--prod'
          working-directory: apps/blog

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time; cancel older in-flight runs on the same branch.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# Required permissions for GitHub Pages deployment via Actions
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portfolio
        run: pnpm --filter portfolio build

      - name: Build blog
        run: pnpm --filter blog build

      # Merge outputs into a single deployable tree.
      #
      # Current layout (GitHub Pages subdirectory, no custom domain):
      #   portfolio:  base='/seanlavoie'  → served at seanlavoie.github.io/seanlavoie/
      #   blog:       base='/seanlavoie/blog' → served at seanlavoie.github.io/seanlavoie/blog/
      #
      # Migrating to a custom domain (seanlavoie.com):
      #   1. Remove `base` from apps/portfolio/astro.config.mjs
      #   2. Change blog base to '/blog' in apps/blog/astro.config.mjs
      #   3. Change blog link in apps/portfolio/src/data/profile.ts back to '/blog'
      #   4. Re-add `echo "seanlavoie.com" > dist/CNAME` below
      #   5. Set up DNS A records → 185.199.108-111.153 and verify in repo Settings → Pages
      - name: Assemble site artifact
        run: |
          mkdir -p dist
          cp -r apps/portfolio/dist/. dist/
          mkdir -p dist/blog
          cp -r apps/blog/dist/. dist/blog/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
